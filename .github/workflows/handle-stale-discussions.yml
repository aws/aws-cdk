name: HandleStaleDiscussions
on:
  schedule:
    - cron: '0 */4 * * *'
  discussion_comment:
    types: [created]

jobs:
  handle-stale-discussions:
    # this workflow will always fail in forks; bail if this isn't running in the upstream
    if: github.repository == 'aws/aws-cdk'
    name: Handle stale discussions
    runs-on: ubuntu-latest
    permissions:
      discussions: write
    steps:
      - name: Stale discussions action
        uses: aws-github-ops/handle-stale-discussions@c0beee451a5d33d9c8f048a6d4e7c856b5422544 # v1.6.0
        env:
          GITHUB_TOKEN:  ${{secrets.GITHUB_TOKEN}}
