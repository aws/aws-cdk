name: PR Issue Reference Check
on:
  pull_request_target:
    types: [opened, edited, reopened]

jobs:
  check-issue-reference:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install type dependencies
        run: yarn install --frozen-lockfile
      - name: Compile TypeScript
        run: npx tsc --project scripts/tsconfig.pr-issue-check.json
      - name: Check PR description for issue reference
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { prIssueCheck } = require('./scripts/pr-issue-check.js');
            await prIssueCheck({ github, context, core });