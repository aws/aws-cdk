name: PR Issue Reference Check
on:
  pull_request:
    types: [opened, edited, reopened]

jobs:
  check-issue-reference:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Compile TypeScript
        run: npx tsc --esModuleInterop --target es2020 --skipLibCheck --outDir scripts scripts/pr-issue-check.ts
      - name: Check PR description for issue reference
        uses: actions/github-script@v8
        run: node scripts/pr-issue-check.js